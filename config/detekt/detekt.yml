build:
  maxIssues: 0
  weights:
    complexity: 2
    naming: 1

complexity:
  LongParameterList:
    # Composable functions legitimately have many parameters — suppress for @Composable.
    ignoreAnnotated: ['Composable']
  TooManyFunctions:
    # ViewModel for the reader screen has 11 functions — raise threshold to accommodate.
    thresholdInClasses: 12

naming:
  FunctionNaming:
    # Compose @Composable functions follow PascalCase by convention
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'

style:
  MagicNumber:
    active: false  # Too noisy for UI code
  MaxLineLength:
    maxLineLength: 120
