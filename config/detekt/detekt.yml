build:
  maxIssues: 0
  weights:
    complexity: 2
    naming: 1

complexity:
  LongParameterList:
    # Composable functions legitimately have many parameters — suppress for @Composable.
    ignoreAnnotated: ['Composable']
  LongMethod:
    # startTts() contains an AudioFocusRequest.Builder chain (14 chained lines, not
    # reducible without losing readability) plus the TTS collection coroutine body.
    # Extracted resumeExistingTts() and condensed comments; residual length is structural.
    threshold: 65
  TooManyFunctions:
    # EpubReaderViewModel: 15 functions (TTS + typography + anchor + gaze lifecycle
    # + resumeExistingTts helper + V2.2 createHighlight).
    # EpubReaderFragment: 15 functions (V2.6 chapter rotor + V2.2 annotation decoration
    # observer + highlight-create + parseLocatorJson).
    # GazeProviderImpl: 13 functions (start/stop/calibrate + pause/resume + thermal + helpers).
    thresholdInClasses: 16

naming:
  FunctionNaming:
    # Compose @Composable functions follow PascalCase by convention
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'

style:
  MagicNumber:
    active: false  # Too noisy for UI code
  MaxLineLength:
    maxLineLength: 120
