build:
  maxIssues: 0
  weights:
    complexity: 2
    naming: 1

complexity:
  LongParameterList:
    # Composable functions legitimately have many parameters — suppress for @Composable.
    ignoreAnnotated: ['Composable']
  TooManyFunctions:
    # EpubReaderViewModel has 12 public functions (TTS + typography + anchor + gaze lifecycle).
    thresholdInClasses: 13

naming:
  FunctionNaming:
    # Compose @Composable functions follow PascalCase by convention
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'

style:
  MagicNumber:
    active: false  # Too noisy for UI code
  MaxLineLength:
    maxLineLength: 120
