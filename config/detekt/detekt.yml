build:
  maxIssues: 0
  weights:
    complexity: 2
    naming: 1

complexity:
  LongParameterList:
    # Composable functions legitimately have many parameters — suppress for @Composable.
    ignoreAnnotated: ['Composable']
  LongMethod:
    # startTts() contains an AudioFocusRequest.Builder chain (14 chained lines, not
    # reducible without losing readability) plus the TTS collection coroutine body.
    # ReaderToolbar (~75 lines): 8 IconButtons + AnimatedVisibility blocks; each is
    # a small, self-contained UI declaration. Extracting into N tiny Composables
    # would be net-worse readability.
    # ReadyOverlay (~75 lines): drives ReaderToolbar + TtsBar + TypographyPanel +
    # AnnotationListPanel + NoteEntryDialog; the param wiring IS the function.
    threshold: 80
  TooManyFunctions:
    # EpubReaderViewModel: 20 functions (TTS + typography + anchor + gaze + V2.2.1
    # createHighlight + V2.2.2 createNote / deleteAnnotation / requestNavigation /
    # startNoteEntry / cancelNoteEntry / confirmNoteEntry).
    # EpubReaderFragment: 17 functions (V2.6 chapter rotor + V2.2.1 decoration
    # observer + highlight-create + parseLocatorJson + V2.2.2 navigation observer +
    # beginNoteEntryFromSelection).
    # GazeProviderImpl: 13 functions (start/stop/calibrate + pause/resume + thermal).
    thresholdInClasses: 22

naming:
  FunctionNaming:
    # Compose @Composable functions follow PascalCase by convention
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'

style:
  MagicNumber:
    active: false  # Too noisy for UI code
  MaxLineLength:
    maxLineLength: 120
