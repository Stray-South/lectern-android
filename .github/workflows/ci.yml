name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build (zero errors, zero warnings)
        run: ./gradlew assembleDebug --no-daemon

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Detekt
        run: ./gradlew detekt --no-daemon

      - name: ktlint
        run: ./gradlew ktlintCheck --no-daemon

      - name: Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Check @Serializable not co-annotated with @Entity
        run: |
          matches=$(find app/src/main/kotlin -name "*.kt" -exec awk '
            /@Serializable/ { s=NR }
            /@Entity/       { if (s && NR-s<=5) { print FILENAME; found=1; exit } }
            /@Entity/       { s2=NR }
            /@Serializable/ { if (s2 && NR-s2<=5) { print FILENAME; found=1; exit } }
          ' {} \; 2>/dev/null || true)
          if [ -n "$matches" ]; then
            echo "FAIL: @Serializable and @Entity on same class (KSP2 bug #1896):"
            echo "$matches"
            exit 1
          fi
          echo "OK: no @Serializable+@Entity co-annotation"

      - name: Banned strings check
        run: bash scripts/check_banned_strings.sh

      - name: Gaze data leak check
        run: bash scripts/check_gaze_data_leak.sh

      - name: Audio session ownership check (ADR-AND-A)
        run: bash scripts/check_audio_session.sh

      - name: Banned dependencies check (ADR-AND-I §3)
        run: bash scripts/check_banned_deps.sh

      - name: Release-build logging check (RULES.md §Code quality)
        run: bash scripts/check_release_logging.sh
